name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      rg_folder:
        description: 'Path to the RG folder in ResourceInputFile repo'
        required: true
        type: string
      action:
        description: 'Terraform action: plan or apply'
        required: true
        type: choice
        options:
          - plan
          - apply
      request_id:
        description: 'Request ID for tracking'
        required: true
        type: string
      callback_url:
        description: 'Backend callback URL to post plan output'
        required: false
        type: string

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.rg_folder }}

    steps:
      - name: Checkout ResourceInputFile
        uses: actions/checkout@v4
        with:
          repository: robinan11/ResourceInputFile
          token: ${{ secrets.REPO_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Plan
        if: inputs.action == 'plan'
        id: plan
        run: |
          set +e
          terraform plan -var-file=terraform.tfvars -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "plan_exitcode=$?" >> $GITHUB_ENV
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Post plan output to backend
        if: inputs.action == 'plan' && inputs.callback_url != ''
        run: |
          PLAN_OUTPUT=$(cat plan_output.txt 2>/dev/null || echo "Plan output not available")
          curl -sf -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.PLAN_CALLBACK_SECRET }}" \
            -d "$(jq -n \
              --arg request_id "${{ inputs.request_id }}" \
              --arg plan_output "$PLAN_OUTPUT" \
              --arg status "success" \
              --arg exit_code "${{ env.plan_exitcode }}" \
              '{request_id: $request_id, plan_output: $plan_output, status: $status, exit_code: $exit_code}')"
          echo "Plan output posted to callback URL"

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -var-file=terraform.tfvars -auto-approve -no-color
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Post failure to backend
        if: failure() && inputs.callback_url != ''
        run: |
          PLAN_OUTPUT=$(cat plan_output.txt 2>/dev/null || echo "Terraform failed before producing output")
          curl -sf -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.PLAN_CALLBACK_SECRET }}" \
            -d "$(jq -n \
              --arg request_id "${{ inputs.request_id }}" \
              --arg plan_output "$PLAN_OUTPUT" \
              --arg status "failed" \
              --arg exit_code "1" \
              '{request_id: $request_id, plan_output: $plan_output, status: $status, exit_code: $exit_code}')"
          echo "Failure posted to callback URL"

      - name: Summary
        if: always()
        run: echo "Request ${{ inputs.request_id }} — ${{ inputs.action }} completed with status ${{ job.status }}"
